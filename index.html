<style>
  :root{
    --paper:#E7E4DB;--paper-grain:#E2DED3;--surface:#FCFBF7;--surface-2:#F3EFE6;
    --ink:#26251F;--ink-soft:#73705F;--ink-faint:#A29E8E;--line:#D8D3C5;--line-soft:#E4E0D4;
    --pine:#1E6B5A;--pine-deep:#13473B;--honey:#C0892B;--honey-wash:#F3E7C8;--honey-line:#E6D7AE;--rose:#B0544A;
    --shadow:0 1px 2px rgba(40,38,30,.05),0 8px 24px -14px rgba(40,38,30,.28);
    --shadow-lift:0 2px 6px rgba(40,38,30,.08),0 18px 38px -18px rgba(40,38,30,.36);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);background-image:radial-gradient(var(--paper-grain) 1px,transparent 1px);
    background-size:22px 22px;color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  #root{height:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:inherit;color:inherit}
  ::selection{background:var(--honey-wash)}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 26px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(var(--paper),rgba(231,228,219,.6));backdrop-filter:blur(2px);flex:0 0 auto}
  .brand{display:flex;align-items:baseline;gap:12px;margin-right:auto}
  .brand h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em;margin:0;line-height:1}
  .brand .eyebrow{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.14em}
  .saved{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);letter-spacing:.08em;display:flex;align-items:center;gap:7px;transition:opacity .4s}
  .saved i{width:6px;height:6px;border-radius:50%;background:var(--pine);display:inline-block}
  .saved.dirty i{background:var(--honey)}
  .saved.err i{background:var(--rose)}
  .iconbtn{display:inline-flex;align-items:center;gap:7px;color:var(--ink-soft);font-size:13px;font-weight:600;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface);transition:.12s}
  .iconbtn:hover{background:var(--surface-2);color:var(--ink)}
  .iconbtn .em{font-size:13px;line-height:0}
  .navbtns{display:flex;gap:4px}
  .iconbtn.nav{font-size:18px;line-height:0;padding:7px 12px;color:var(--ink-soft);font-weight:700}
  .iconbtn.nav:hover{color:var(--pine)}
  .iconbtn.nav:active{background:var(--pine);color:#F6F4EC;border-color:var(--pine)}

  .board{flex:1 1 auto;overflow-x:auto;overflow-y:hidden;display:flex;align-items:flex-start;gap:18px;padding:24px 26px 40px;overscroll-behavior-x:contain}
  .board::-webkit-scrollbar{height:11px}
  .board::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px;border:3px solid var(--paper)}
  .board::-webkit-scrollbar-track{background:transparent}

  .col{flex:0 0 332px;width:332px;max-height:100%;display:flex;flex-direction:column;background:var(--surface);
    border:1px solid var(--line-soft);border-radius:16px;box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s}
  .col.drop-target{box-shadow:0 0 0 2px var(--pine),var(--shadow-lift)}
  .col-head{padding:15px 16px 13px;border-bottom:1px solid var(--line-soft);border-radius:16px 16px 0 0;position:relative}
  .col-head .grip{position:absolute;left:6px;top:21px;color:var(--ink-faint);cursor:grab;padding:6px 4px;line-height:0;opacity:0;transition:opacity .15s;font-size:14px;letter-spacing:-3px}
  .col-head:hover .grip{opacity:.7}
  .col-head .grip:active{cursor:grabbing}
  .name-row{display:flex;align-items:flex-start;gap:8px;padding-left:14px}
  .name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.015em;line-height:1.2;color:var(--ink);
    flex:1;border-radius:6px;padding:2px 4px;margin:-2px -4px;border:1px solid transparent;background:transparent;width:100%;resize:none;overflow:hidden}
  .name:hover{background:var(--surface-2)}
  .name:focus{outline:none;background:#fff;border-color:var(--pine);box-shadow:0 0 0 3px rgba(30,107,90,.12)}
  .col-menu{position:relative}
  .col-menu .dots{color:var(--ink-faint);padding:4px 8px;border-radius:7px;font-size:18px;line-height:.6}
  .col-menu .dots:hover{background:var(--surface-2);color:var(--ink-soft)}
  .menu-pop{position:absolute;right:0;top:30px;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lift);padding:5px;min-width:148px}
  .menu-pop button{display:flex;width:100%;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:13.5px;font-weight:500;text-align:left;color:var(--ink-soft)}
  .menu-pop button:hover{background:var(--surface-2);color:var(--ink)}
  .menu-pop button.danger{color:var(--rose)}
  .menu-pop button.danger:hover{background:#f7e9e7}

  .links{display:flex;flex-wrap:wrap;gap:7px;padding:12px 16px 4px;padding-left:30px}
  .bubble{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--pine-deep);background:var(--surface);
    border:1px solid var(--line);padding:5px 11px;border-radius:9px;box-shadow:0 1px 0 var(--line);transition:transform .1s,box-shadow .1s,background .12s;text-decoration:none;max-width:100%}
  .bubble .dot{width:6px;height:6px;border-radius:50%;background:var(--pine);flex:0 0 auto}
  .bubble span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bubble:hover{background:var(--honey-wash);transform:translateY(-1px);box-shadow:0 3px 8px -3px rgba(40,38,30,.3)}
  .bubble:active{transform:translateY(0);box-shadow:0 1px 0 var(--line)}
  .bubble .kill{margin-left:2px;color:var(--ink-faint);font-size:13px;line-height:0;padding:2px;border-radius:4px}
  .bubble .kill:hover{color:var(--rose);background:rgba(176,84,74,.12)}
  .bubble.add{color:var(--ink-soft);border-style:dashed;box-shadow:none;background:transparent}
  .bubble.add:hover{color:var(--pine);border-color:var(--pine);background:var(--surface-2);transform:none}

  .col-body{overflow-y:auto;padding:6px 16px 16px;flex:1 1 auto}
  .col-body::-webkit-scrollbar{width:8px}
  .col-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px;border:2px solid var(--surface)}

  .status{margin:10px 0 4px;background:var(--surface-2);border-left:3px solid var(--honey);border-radius:0 9px 9px 0;padding:9px 11px}
  .status textarea{width:100%;border:none;background:transparent;resize:none;outline:none;font-size:13.5px;line-height:1.5;color:var(--ink);overflow:hidden;display:block}
  .status textarea::placeholder{color:var(--ink-faint)}

  .section{margin-top:16px}
  .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
  .sec-label{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-soft)}
  .sec-label::before{content:"";display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--pine);margin-right:8px;vertical-align:middle;transform:translateY(-1px)}
  .sec-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);background:var(--surface-2);padding:2px 7px;border-radius:20px}

  .card{background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:9px 10px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px;
    box-shadow:0 1px 1px rgba(40,38,30,.03);transition:box-shadow .12s,transform .08s,border-color .12s}
  .card:hover{box-shadow:0 2px 10px -4px rgba(40,38,30,.28);border-color:var(--line)}
  .card.drop-target{border-color:var(--pine);box-shadow:0 0 0 1.5px var(--pine)}
  .card .grip-c{color:var(--ink-faint);cursor:grab;font-size:13px;line-height:1;letter-spacing:-3px;opacity:0;transition:opacity .12s;padding-top:2px;user-select:none}
  .card:hover .grip-c{opacity:.55}
  .card .grip-c:active{cursor:grabbing}
  .check{flex:0 0 auto;width:17px;height:17px;border-radius:5px;border:1.5px solid var(--line);background:#fff;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s}
  .check:hover{border-color:var(--pine);background:var(--honey-wash)}
  .check:active{background:var(--pine);border-color:var(--pine)}
  .card-text{flex:1;font-size:13.5px;line-height:1.45;color:var(--ink);border:none;background:transparent;resize:none;outline:none;overflow:hidden;padding:1px 2px;border-radius:5px;display:block;width:100%}
  .card-text:focus{background:#fff;box-shadow:0 0 0 2px rgba(30,107,90,.14)}
  .star{flex:0 0 auto;color:var(--ink-faint);font-size:15px;line-height:1;padding:2px 3px;border-radius:6px;opacity:0;transition:opacity .12s,color .12s,background .12s}
  .card:hover .star{opacity:.65}
  .star:hover{color:var(--honey);background:var(--honey-wash)}
  .star.on{opacity:1;color:var(--honey)}
  .card .kill{opacity:0;color:var(--ink-faint);font-size:14px;line-height:0;padding:3px;border-radius:5px;transition:opacity .12s;flex:0 0 auto}
  .card:hover .kill{opacity:1}
  .card .kill:hover{color:var(--rose);background:rgba(176,84,74,.1)}

  .add-card{display:flex;align-items:center;gap:8px;width:100%;color:var(--ink-soft);font-size:13px;font-weight:500;padding:8px 10px;border-radius:9px;border:1px dashed var(--line);background:transparent;transition:border-color .12s,color .12s,background .12s}
  .add-card:hover{border-color:var(--pine);color:var(--pine);background:var(--surface-2)}
  .add-card .plus{font-size:16px;line-height:0}
  .add-input{width:100%;border:1px solid var(--pine);border-radius:9px;background:#fff;padding:8px 10px;font-size:13.5px;outline:none;box-shadow:0 0 0 3px rgba(30,107,90,.1)}

  /* ---- Today column ---- */
  .col.today{border-color:var(--honey-line);box-shadow:0 1px 2px rgba(40,38,30,.05),0 8px 24px -14px rgba(192,137,43,.34)}
  .col.today .col-head{background:linear-gradient(180deg,var(--honey-wash),var(--surface));border-bottom-color:var(--honey-line)}
  .today-head{display:flex;align-items:center;gap:9px}
  .today-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.015em;margin:0;line-height:1}
  .today-head .sun{font-size:16px;line-height:1}
  .today-head .sec-count{background:#fff;border:1px solid var(--honey-line)}
  .today-date{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#A9741F;margin-top:7px}
  .today-empty{font-size:13px;color:var(--ink-soft);line-height:1.55;padding:10px 4px}

  .t-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:9px 10px;margin-bottom:7px;transition:box-shadow .12s,border-color .12s}
  .t-row:hover{box-shadow:0 2px 10px -4px rgba(40,38,30,.25);border-color:var(--line)}
  .t-text{flex:1;font-size:13.5px;line-height:1.45;color:var(--ink);padding-top:1px;min-width:0;word-break:break-word}
  .t-text.edit{border:none;background:transparent;resize:none;outline:none;overflow:hidden;display:block;width:100%;padding:1px 2px;border-radius:5px}
  .t-text.edit:focus{background:#fff;box-shadow:0 0 0 2px rgba(30,107,90,.14)}
  .t-kill{opacity:0;color:var(--ink-faint);font-size:13px;line-height:0;padding:3px;border-radius:5px;flex:0 0 auto;transition:opacity .12s}
  .t-row:hover .t-kill{opacity:1}
  .t-kill:hover{color:var(--rose);background:rgba(176,84,74,.1)}

  .chip{font-family:'Space Mono',monospace;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    color:var(--pine-deep);background:var(--surface-2);border:1px solid var(--line-soft);border-radius:20px;padding:3px 8px;
    white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis;flex:0 0 auto;margin-top:1px}
  .chip.misc{color:var(--ink-faint)}

  /* ---- Archive ---- */
  .scrim{position:fixed;inset:0;background:rgba(38,37,31,.34);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lift);width:100%;max-width:380px;padding:22px;border:1px solid var(--line)}
  .modal h3{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;margin:0 0 4px;letter-spacing:-.01em}
  .modal p.sub{color:var(--ink-soft);font-size:13px;margin:0 0 18px}
  .field{margin-bottom:13px}
  .field label{display:block;font-family:'Space Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:6px}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 12px;font-size:14px;outline:none;transition:.12s}
  .field input:focus{border-color:var(--pine);box-shadow:0 0 0 3px rgba(30,107,90,.12)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;transition:.12s}
  .btn-ghost{background:var(--surface-2);color:var(--ink-soft)}
  .btn-ghost:hover{background:var(--line-soft);color:var(--ink)}
  .btn-solid{background:var(--pine);color:#F6F4EC;box-shadow:0 1px 0 var(--pine-deep)}
  .btn-solid:hover{background:var(--pine-deep)}

  .arch{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lift);width:100%;max-width:540px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
  .arch-top{padding:22px 24px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:flex-start}
  .arch-top h3{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;margin:0;letter-spacing:-.01em}
  .arch-top p{color:var(--ink-soft);font-size:13px;margin:4px 0 0}
  .arch-x{margin-left:auto;color:var(--ink-faint);font-size:22px;line-height:.6;padding:4px 8px;border-radius:8px}
  .arch-x:hover{background:var(--surface-2);color:var(--ink)}
  .arch-body{overflow-y:auto;padding:6px 24px 22px}
  .arch-day{margin-top:20px}
  .arch-day:first-child{margin-top:12px}
  .arch-day-h{display:flex;align-items:baseline;gap:9px;margin-bottom:6px;position:sticky;top:0;background:var(--surface);padding:6px 0 4px}
  .arch-day-h .d{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14.5px;color:var(--ink)}
  .arch-day-h .n{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--ink-faint)}
  .arch-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid var(--line-soft)}
  .arch-row .done-dot{width:16px;height:16px;border-radius:5px;background:var(--pine);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .arch-row .done-dot::after{content:"";width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
  .arch-row .a-text{flex:1;font-size:13.5px;color:var(--ink);line-height:1.4;min-width:0;word-break:break-word}
  .arch-meta{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .arch-row .time{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-faint);flex:0 0 auto}
  .arch-act{opacity:0;color:var(--ink-soft);font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;flex:0 0 auto;transition:.12s}
  .arch-row:hover .arch-act{opacity:1}
  .arch-act:hover{background:var(--surface-2);color:var(--ink)}
  .arch-empty{text-align:center;color:var(--ink-soft);padding:46px 24px;font-size:14px;line-height:1.6}
  .arch-empty .big{font-size:30px;display:block;margin-bottom:12px}

  .add-col{flex:0 0 300px;width:300px;align-self:stretch;max-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    border:1.5px dashed var(--line);border-radius:16px;color:var(--ink-soft);background:rgba(252,251,247,.4);transition:.15s;min-height:220px}
  .add-col:hover{border-color:var(--pine);color:var(--pine);background:rgba(252,251,247,.8)}
  .add-col .ring{width:38px;height:38px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300}
  .add-col .lbl{font-size:14px;font-weight:600}

  /* ---- login / gate ---- */
  .gate{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lift);padding:30px 28px}
  .gate-card .mark{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .gate-card h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.02em;margin:0;line-height:1}
  .gate-card .eyebrow{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.14em}
  .gate-card .lead{color:var(--ink-soft);font-size:14px;line-height:1.5;margin:6px 0 22px}
  .gate-card .field{margin-bottom:14px}
  .gate-btn{width:100%;background:var(--pine);color:#F6F4EC;font-weight:600;font-size:15px;padding:12px;border-radius:11px;box-shadow:0 1px 0 var(--pine-deep);transition:.12s;margin-top:4px}
  .gate-btn:hover{background:var(--pine-deep)}
  .gate-btn:disabled{opacity:.6;cursor:default}
  .gate-err{color:var(--rose);font-size:13px;margin:12px 0 0;line-height:1.45}
  .pw-hint{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--ink-faint);letter-spacing:.02em;margin:7px 2px 0}
  .setup-note{font-size:12.5px;color:var(--ink-soft);line-height:1.6;background:var(--surface-2);border-radius:11px;padding:14px 16px;margin-top:18px}
  .setup-note code{font-family:'Space Mono',monospace;font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px}

  @media (max-width:600px){
    .topbar{padding:13px 14px;gap:8px}.board{padding:18px 14px 36px;gap:14px}
    .brand h1{font-size:20px}
    .col{flex-basis:88vw;width:88vw}.saved{display:none}
    .brand .eyebrow{display:none}.navbtns{display:none}
    .iconbtn{padding:9px 10px}.iconbtn .txt{display:none}

    /* touch has no hover — show controls and make them tappable */
    .card .grip-c,.col-head .grip{display:none}
    .card .star,.card .kill,.t-kill{opacity:1}
    .card{padding:10px 11px;gap:10px}
    .check{width:21px;height:21px}
    .star{padding:7px 8px;font-size:18px}
    .card .kill{padding:7px 6px;font-size:17px}
    .t-kill{padding:7px 6px;font-size:15px}
    .bubble .kill{opacity:1}

    /* archive as a bottom sheet; grid keeps the task text on its own full line */
    .scrim{padding:0;align-items:flex-end}
    .arch{max-width:100%;max-height:88vh;border-radius:18px 18px 0 0}
    .arch-top{padding:18px 18px 14px}
    .arch-body{padding:4px 18px 28px}
    .arch-row{display:grid;grid-template-columns:auto 1fr;grid-template-areas:"dot text" ". meta";column-gap:11px;row-gap:8px;align-items:center;padding:12px 0}
    .arch-row .done-dot{grid-area:dot;align-self:start;margin-top:2px}
    .arch-row .a-text{grid-area:text;min-width:0}
    .arch-meta{grid-area:meta;display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px}
    .arch-act{opacity:1;padding:5px 12px;background:var(--surface-2)}
    .arch-act:last-child{color:var(--rose)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ============================ STORAGE: Supabase ============================ */
const configured = () =>
  window.SUPABASE_URL && !window.SUPABASE_URL.includes("YOUR-PROJECT") &&
  window.SUPABASE_ANON_KEY && !window.SUPABASE_ANON_KEY.includes("YOUR-PUBLIC");

let sb = null;
const client = () => {
  if(!sb) sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    auth: { persistSession:true, autoRefreshToken:true, storageKey:"workbench-auth" }
  });
  return sb;
};
const Store = {
  async load(){
    const {data,error} = await client().from("boards").select("data").maybeSingle();
    if(error) throw error;
    return data ? data.data : null;
  },
  async save(board,userId){
    const {error} = await client().from("boards").upsert({id:userId, data:board, updated_at:new Date().toISOString()});
    if(error) throw error;
  }
};

/* keep older saved boards working: drop Questions, fold any old "done" tasks away, ensure new fields */
function normalize(b){
  if(!b || !Array.isArray(b.projects)) return seed();
  return {
    projects: b.projects.map(p=>({
      id:p.id||uid(), name:p.name||"Untitled project",
      links:Array.isArray(p.links)?p.links:[],
      status:typeof p.status==="string"?p.status:"",
      tasks:Array.isArray(p.tasks)? p.tasks.filter(t=>!t.done).map(t=>({id:t.id||uid(),text:t.text||"",today:!!t.today})) : []
    })),
    todayMisc: Array.isArray(b.todayMisc)? b.todayMisc.map(m=>({id:m.id||uid(),text:m.text||""})) : [],
    archive: Array.isArray(b.archive)? b.archive : []
  };
}

const seed = () => ({
  projects:[
    { id:uid(), name:"Website Redesign",
      links:[{id:uid(),label:"Drive",url:"https://drive.google.com"},{id:uid(),label:"Figma",url:"https://figma.com"}],
      status:"Wireframes signed off. Waiting on final copy before I start the build.",
      tasks:[{id:uid(),text:"Write the About page copy",today:false},{id:uid(),text:"Set up the contact form",today:true},{id:uid(),text:"Export hero illustrations",today:false}] },
    { id:uid(), name:"Q3 Report",
      links:[{id:uid(),label:"Doc",url:"https://docs.google.com"}],
      status:"Pulling numbers together. Draft due end of month.",
      tasks:[{id:uid(),text:"Get sales figures from Sam",today:true},{id:uid(),text:"Build the revenue chart",today:false}] },
  ],
  todayMisc:[{id:uid(),text:"Book the dentist"}],
  archive:[]
});

/* date helpers for the archive */
const startOfDay = (d)=> new Date(d.getFullYear(),d.getMonth(),d.getDate());
function dayLabel(iso){
  const d=new Date(iso), now=new Date();
  const diff=Math.round((startOfDay(now)-startOfDay(d))/86400000);
  if(diff===0) return "Today";
  if(diff===1) return "Yesterday";
  return d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});
}
const timeLabel = (iso)=> new Date(iso).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
function groupByDay(items){
  const order=[], map={};
  items.forEach(it=>{ const k=startOfDay(new Date(it.completedAt)).toDateString();
    if(!map[k]){ map[k]={key:k,label:dayLabel(it.completedAt),items:[]}; order.push(map[k]); }
    map[k].items.push(it); });
  return order;
}

function useAutoGrow(value){
  const ref=useRef(null);
  useEffect(()=>{ const el=ref.current; if(el){ el.style.height="auto"; el.style.height=el.scrollHeight+"px"; } },[value]);
  return ref;
}

/* ================================ Root / gates ================================ */
function Root(){
  const [phase,setPhase]=useState("boot");
  const [user,setUser]=useState(null);
  useEffect(()=>{
    if(!configured()){ setPhase("setup"); return; }
    const c=client();
    c.auth.getSession().then(({data})=>{ if(data.session){ setUser(data.session.user); setPhase("app"); } else setPhase("login"); });
    const {data:sub}=c.auth.onAuthStateChange((_e,session)=>{
      if(session){ setUser(session.user); setPhase("app"); } else { setUser(null); setPhase("login"); }
    });
    return ()=> sub.subscription.unsubscribe();
  },[]);
  if(phase==="boot")  return <Gate><p className="lead">Loading…</p></Gate>;
  if(phase==="setup") return <SetupGate/>;
  if(phase==="login") return <Login/>;
  return <App user={user} onSignOut={()=>client().auth.signOut()}/>;
}
function Gate({children}){
  return <div className="gate"><div className="gate-card">
    <div className="mark"><h1>Workbench</h1><span className="eyebrow">project board</span></div>
    {children}
  </div></div>;
}
function SetupGate(){
  return <Gate>
    <p className="lead">Almost there — this build just needs your Supabase keys.</p>
    <div className="setup-note">Open the HTML file and fill in <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> near the top
      (Supabase → <strong>Project Settings → API</strong>). Full walkthrough is in <strong>SETUP.md</strong>.</div>
  </Gate>;
}

/* ================================ Login ================================ */
const EMAIL_KEY="workbench:last-email";
function Login(){
  const remembered=(()=>{ try{ return localStorage.getItem(EMAIL_KEY)||""; }catch(e){ return ""; } })();
  const [email,setEmail]=useState(remembered);
  const [pw,setPw]=useState(""); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  const emailRef=useRef(null), pwRef=useRef(null);
  useEffect(()=>{ if(remembered && pwRef.current) pwRef.current.focus(); else if(emailRef.current) emailRef.current.focus(); },[]);
  const submit=async()=>{
    if(busy) return; setErr(""); setBusy(true);
    try{ localStorage.setItem(EMAIL_KEY,email.trim()); }catch(e){}
    const {error}=await client().auth.signInWithPassword({email:email.trim(),password:pw});
    if(error){ setErr(error.message||"That didn't work — check your email and password."); setBusy(false); }
  };
  const hint=window.PASSWORD_HINT;
  return <Gate>
    <p className="lead">Sign in to your board.</p>
    <div className="field"><label>Email</label>
      <input ref={emailRef} type="email" value={email} placeholder="you@email.com"
        onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/></div>
    <div className="field"><label>Password</label>
      <input ref={pwRef} type="password" value={pw} placeholder="••••••••"
        onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/>
      {hint && <p className="pw-hint">{hint}</p>}</div>
    <button className="gate-btn" onClick={submit} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
    {err && <p className="gate-err">{err}</p>}
  </Gate>;
}

/* ================================ App ================================ */
function App({user,onSignOut}){
  const [board,setBoard]=useState(null);
  const [state,setState]=useState("loading");
  const [linkFor,setLinkFor]=useState(null);
  const [showArchive,setShowArchive]=useState(false);
  const saveT=useRef(null), drag=useRef(null), skipSave=useRef(true);
  const boardRef=useRef(null);

  // smooth horizontal navigation: wheel pans sideways, arrow keys jump by a project
  useEffect(()=>{
    const el=boardRef.current; if(!el) return;
    const step=()=>{ const c=el.querySelector(".col"); return (c?c.getBoundingClientRect().width:332)+18; };
    const onWheel=(e)=>{
      if(e.deltaY===0) return;
      if(Math.abs(e.deltaX)>Math.abs(e.deltaY)) return;            // trackpad sideways: leave it native
      let n=e.target;                                              // let a long task list scroll first
      while(n && n!==el){
        if(n.classList && n.classList.contains("col-body")){
          const canV=n.scrollHeight>n.clientHeight+1;
          const atTop=n.scrollTop<=0, atBot=n.scrollTop+n.clientHeight>=n.scrollHeight-1;
          if(canV && !((e.deltaY<0&&atTop)||(e.deltaY>0&&atBot))) return;
          break;
        }
        n=n.parentElement;
      }
      el.scrollLeft+=e.deltaY; e.preventDefault();
    };
    const onKey=(e)=>{
      const t=e.target;
      if(t && (t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable)) return;
      if(e.metaKey||e.ctrlKey||e.altKey) return;
      if(e.key==="ArrowRight"){ el.scrollBy({left:step(),behavior:"smooth"}); e.preventDefault(); }
      else if(e.key==="ArrowLeft"){ el.scrollBy({left:-step(),behavior:"smooth"}); e.preventDefault(); }
      else if(e.key==="Home"){ el.scrollTo({left:0,behavior:"smooth"}); e.preventDefault(); }
      else if(e.key==="End"){ el.scrollTo({left:el.scrollWidth,behavior:"smooth"}); e.preventDefault(); }
    };
    el.addEventListener("wheel",onWheel,{passive:false});
    window.addEventListener("keydown",onKey);
    return ()=>{ el.removeEventListener("wheel",onWheel); window.removeEventListener("keydown",onKey); };
  },[board!==null]);

  const page=(dir)=>{ const el=boardRef.current; if(el) el.scrollBy({left:dir*Math.max(el.clientWidth*0.85,300),behavior:"smooth"}); };

  useEffect(()=>{ (async()=>{
    try{
      const loaded=await Store.load();
      if(loaded){ setBoard(normalize(loaded)); }
      else { const s=seed(); setBoard(s); await Store.save(s,user.id); }
      setState("saved");
    }catch(e){ console.error(e); setState("error"); setBoard({projects:[],todayMisc:[],archive:[]}); }
  })(); },[user.id]);

  useEffect(()=>{
    if(board===null) return;
    if(skipSave.current){ skipSave.current=false; return; }
    setState("dirty"); clearTimeout(saveT.current);
    saveT.current=setTimeout(async()=>{ try{ await Store.save(board,user.id); setState("saved"); }catch(e){ console.error(e); setState("error"); } },600);
    return ()=>clearTimeout(saveT.current);
  },[board,user.id]);

  const update=useCallback((fn)=> setBoard(b=>({...b,projects:fn(b.projects)})),[]);
  const patchProject=(pid,patch)=> update(ps=>ps.map(p=>p.id===pid?{...p,...patch}:p));
  const addProject=()=> update(ps=>[...ps,{id:uid(),name:"New project",links:[],status:"",tasks:[]}]);
  const removeProject=(pid)=> update(ps=>ps.filter(p=>p.id!==pid));
  const reorder=(pid,key,from,to)=> update(ps=>ps.map(p=>{ if(p.id!==pid) return p; const a=[...p[key]]; const[m]=a.splice(from,1); a.splice(to,0,m); return {...p,[key]:a}; }));
  const reorderCols=(from,to)=> update(ps=>{ const a=[...ps]; const[m]=a.splice(from,1); a.splice(to,0,m); return a; });

  const addTask=(pid,text)=> update(ps=>ps.map(p=>p.id===pid?{...p,tasks:[...p.tasks,{id:uid(),text,today:false}]}:p));
  const editTask=(pid,tid,text)=> update(ps=>ps.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,text}:t)}:p));
  const deleteTask=(pid,tid)=> update(ps=>ps.map(p=>p.id===pid?{...p,tasks:p.tasks.filter(t=>t.id!==tid)}:p));
  const toggleToday=(pid,tid)=> update(ps=>ps.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,today:!t.today}:t)}:p));
  const unstar=(pid,tid)=> update(ps=>ps.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,today:false}:t)}:p));

  const completeTask=(pid,tid)=> setBoard(b=>{
    const p=b.projects.find(x=>x.id===pid); if(!p) return b;
    const t=p.tasks.find(x=>x.id===tid); if(!t) return b;
    return {...b,
      projects:b.projects.map(x=>x.id===pid?{...x,tasks:x.tasks.filter(y=>y.id!==tid)}:x),
      archive:[{id:uid(),text:t.text,tag:p.name,projectId:pid,completedAt:new Date().toISOString()},...b.archive]};
  });
  const addMisc=(text)=> setBoard(b=>({...b,todayMisc:[...b.todayMisc,{id:uid(),text}]}));
  const editMisc=(mid,text)=> setBoard(b=>({...b,todayMisc:b.todayMisc.map(m=>m.id===mid?{...m,text}:m)}));
  const deleteMisc=(mid)=> setBoard(b=>({...b,todayMisc:b.todayMisc.filter(m=>m.id!==mid)}));
  const completeMisc=(mid)=> setBoard(b=>{
    const m=b.todayMisc.find(x=>x.id===mid); if(!m) return b;
    return {...b, todayMisc:b.todayMisc.filter(x=>x.id!==mid),
      archive:[{id:uid(),text:m.text,tag:"Today",projectId:null,completedAt:new Date().toISOString()},...b.archive]};
  });
  const restore=(eid)=> setBoard(b=>{
    const e=b.archive.find(x=>x.id===eid); if(!e) return b;
    const archive=b.archive.filter(x=>x.id!==eid);
    const proj=e.projectId && b.projects.find(p=>p.id===e.projectId);
    if(proj) return {...b,archive,projects:b.projects.map(p=>p.id===e.projectId?{...p,tasks:[...p.tasks,{id:uid(),text:e.text,today:false}]}:p)};
    return {...b,archive,todayMisc:[...b.todayMisc,{id:uid(),text:e.text}]};
  });
  const deleteArchive=(eid)=> setBoard(b=>({...b,archive:b.archive.filter(x=>x.id!==eid)}));

  if(board===null) return <Gate><p className="lead">Opening your board…</p></Gate>;

  const todayTasks=board.projects.flatMap(p=>p.tasks.filter(t=>t.today).map(t=>({id:t.id,text:t.text,projectId:p.id,tag:p.name})));
  const todayDate=new Date().toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});
  const statusText={loading:"loading…",dirty:"saving…",saved:"all saved",error:"save failed — retrying on next edit"}[state];

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand"><h1>Workbench</h1><span className="eyebrow">project board</span></div>
        <span className={"saved"+(state==="dirty"?" dirty":"")+(state==="error"?" err":"")}><i></i>{statusText}</span>
        <div className="navbtns">
          <button className="iconbtn nav" onClick={()=>page(-1)} title="Scroll left (← arrow key)">‹</button>
          <button className="iconbtn nav" onClick={()=>page(1)} title="Scroll right (→ arrow key)">›</button>
        </div>
        <button className="iconbtn" onClick={()=>setShowArchive(true)} title="Archive"><span className="em">🗂</span><span className="txt">Archive</span></button>
        <button className="iconbtn" onClick={onSignOut} title="Sign out">Sign out</button>
      </div>

      <div className="board" ref={boardRef}>
        <TodayColumn date={todayDate} tasks={todayTasks} misc={board.todayMisc}
          onCompleteTask={completeTask} onUnstar={unstar}
          onAddMisc={addMisc} onCompleteMisc={completeMisc} onEditMisc={editMisc} onDeleteMisc={deleteMisc}/>

        {board.projects.map((p,ci)=>(
          <Column key={p.id} p={p} ci={ci} patch={patchProject} remove={removeProject}
            reorder={reorder} reorderCols={reorderCols} drag={drag}
            openLink={()=>setLinkFor(p.id)}
            complete={completeTask} toggleToday={toggleToday}
            addTask={addTask} editTask={editTask} deleteTask={deleteTask}/>
        ))}

        <button className="add-col" onClick={addProject}><span className="ring">+</span><span className="lbl">Add project</span></button>
      </div>

      {linkFor && <LinkModal onClose={()=>setLinkFor(null)} onSave={(label,url)=>{
        patchProject(linkFor,{links:[...board.projects.find(p=>p.id===linkFor).links,{id:uid(),label,url}]}); setLinkFor(null);
      }}/>}

      {showArchive && <Archive archive={board.archive} onClose={()=>setShowArchive(false)} onRestore={restore} onDelete={deleteArchive}/>}
    </div>
  );
}

/* ================================ Today column ================================ */
function TodayColumn({date,tasks,misc,onCompleteTask,onUnstar,onAddMisc,onCompleteMisc,onEditMisc,onDeleteMisc}){
  const [adding,setAdding]=useState(false), [draft,setDraft]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{ if(adding&&inputRef.current) inputRef.current.focus(); },[adding]);
  const commit=()=>{ const t=draft.trim(); if(t) onAddMisc(t); setDraft(""); setAdding(false); };
  const empty = tasks.length===0 && misc.length===0;

  return (
    <div className="col today">
      <div className="col-head">
        <div className="today-head">
          <span className="sun">☀️</span><h2>Today</h2>
          <span className="sec-count">{tasks.length+misc.length}</span>
        </div>
        <div className="today-date">{date}</div>
      </div>
      <div className="col-body">
        {empty && <div className="today-empty">Nothing here yet. Tap the ☀ on any task to pull it in, or jot a quick one below.</div>}
        {tasks.map(t=>(
          <div className="t-row" key={t.id}>
            <button className="check" title="Mark done" onClick={()=>onCompleteTask(t.projectId,t.id)}></button>
            <div className="t-text">{t.text}</div>
            <span className="chip" title={t.tag}>{t.tag}</span>
            <button className="t-kill" title="Remove from today" onClick={()=>onUnstar(t.projectId,t.id)}>✕</button>
          </div>
        ))}
        {misc.map(m=> <MiscRow key={m.id} m={m} onComplete={()=>onCompleteMisc(m.id)} onEdit={(t)=>onEditMisc(m.id,t)} onDelete={()=>onDeleteMisc(m.id)}/>)}
        {adding ? (
          <input ref={inputRef} className="add-input" value={draft} placeholder="Something for today…"
            onChange={e=>setDraft(e.target.value)} onBlur={commit}
            onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();commit();} if(e.key==="Escape"){setDraft("");setAdding(false);} }}/>
        ) : (
          <button className="add-card" onClick={()=>setAdding(true)}><span className="plus">+</span> Add to today</button>
        )}
      </div>
    </div>
  );
}
function MiscRow({m,onComplete,onEdit,onDelete}){
  const ref=useAutoGrow(m.text);
  return (
    <div className="t-row">
      <button className="check" title="Mark done" onClick={onComplete}></button>
      <textarea ref={ref} className="t-text edit" rows={1} value={m.text} spellCheck={false}
        onChange={e=>onEdit(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();e.target.blur();} }}/>
      <span className="chip misc">misc</span>
      <button className="t-kill" title="Delete" onClick={onDelete}>✕</button>
    </div>
  );
}

/* ================================ Project column ================================ */
function Column({p,ci,patch,remove,reorder,reorderCols,drag,openLink,complete,toggleToday,addTask,editTask,deleteTask}){
  const [menu,setMenu]=useState(false), [over,setOver]=useState(false);
  const nameRef=useAutoGrow(p.name), statusRef=useAutoGrow(p.status);
  const onColDragStart=(e)=>{ drag.current={type:"col",from:ci}; e.dataTransfer.effectAllowed="move"; };
  const onColDrop=(e)=>{ e.preventDefault(); setOver(false); if(drag.current?.type==="col"&&drag.current.from!==ci) reorderCols(drag.current.from,ci); drag.current=null; };
  const setLinks=(links)=>patch(p.id,{links});

  return (
    <div className={"col"+(over?" drop-target":"")}
      onDragOver={(e)=>{ if(drag.current?.type==="col"){ e.preventDefault(); setOver(true);} }}
      onDragLeave={()=>setOver(false)} onDrop={onColDrop}>
      <div className="col-head">
        <span className="grip" draggable onDragStart={onColDragStart} onDragEnd={()=>{drag.current=null;}} title="Drag to reorder">⋮⋮</span>
        <div className="name-row">
          <textarea className="name" rows={1} ref={nameRef} value={p.name} spellCheck={false}
            onChange={e=>patch(p.id,{name:e.target.value})} onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();e.target.blur();} }}/>
          <div className="col-menu">
            <button className="dots" onClick={()=>setMenu(m=>!m)} aria-label="Project menu">⋯</button>
            {menu && (<>
              <div style={{position:"fixed",inset:0,zIndex:20}} onClick={()=>setMenu(false)}/>
              <div className="menu-pop"><button className="danger" onClick={()=>{ if(confirm("Delete “"+p.name+"” and everything in it?")) remove(p.id); setMenu(false); }}>🗑  Delete project</button></div>
            </>)}
          </div>
        </div>
        <div className="links">
          {p.links.map(l=>(
            <a key={l.id} className="bubble" href={normalizeUrl(l.url)} target="_blank" rel="noopener noreferrer" title={l.url}>
              <span className="dot"></span><span>{l.label||"link"}</span>
              <button className="kill" title="Remove link" onClick={(e)=>{e.preventDefault();e.stopPropagation(); setLinks(p.links.filter(x=>x.id!==l.id));}}>×</button>
            </a>
          ))}
          <button className="bubble add" onClick={openLink}>+ link</button>
        </div>
      </div>
      <div className="col-body">
        <div className="status">
          <textarea ref={statusRef} rows={1} value={p.status} placeholder="Where are things at? Jot a quick status…"
            onChange={e=>patch(p.id,{status:e.target.value})}/>
        </div>
        <TaskList pid={p.id} tasks={p.tasks} drag={drag} onReorder={reorder}
          onAdd={(t)=>addTask(p.id,t)} onComplete={complete} onToggleToday={toggleToday} onEdit={editTask} onDelete={deleteTask}/>
      </div>
    </div>
  );
}

/* ================================ Task list + card ================================ */
function TaskList({pid,tasks,drag,onReorder,onAdd,onComplete,onToggleToday,onEdit,onDelete}){
  const [adding,setAdding]=useState(false), [draft,setDraft]=useState(""), [overIdx,setOverIdx]=useState(-1);
  const inputRef=useRef(null);
  useEffect(()=>{ if(adding&&inputRef.current) inputRef.current.focus(); },[adding]);
  const commit=()=>{ const t=draft.trim(); if(t) onAdd(t); setDraft(""); setAdding(false); };
  return (
    <div className="section">
      <div className="sec-head"><span className="sec-label">Tasks</span><span className="sec-count">{tasks.length}</span></div>
      {tasks.map((it,i)=>(
        <TaskCard key={it.id} it={it} dropTarget={overIdx===i}
          onDragStart={()=>{ drag.current={type:"card",pid,from:i}; }}
          onDragEnter={()=>{ if(drag.current?.type==="card"&&drag.current.pid===pid) setOverIdx(i); }}
          onDrop={()=>{ const d=drag.current; setOverIdx(-1); if(d?.type==="card"&&d.pid===pid&&d.from!==i) onReorder(pid,"tasks",d.from,i); drag.current=null; }}
          onComplete={()=>onComplete(pid,it.id)} onToggleToday={()=>onToggleToday(pid,it.id)}
          onEdit={(t)=>onEdit(pid,it.id,t)} onDelete={()=>onDelete(pid,it.id)}/>
      ))}
      {adding ? (
        <input ref={inputRef} className="add-input" value={draft} placeholder="Add a task…"
          onChange={e=>setDraft(e.target.value)} onBlur={commit}
          onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();commit();} if(e.key==="Escape"){setDraft("");setAdding(false);} }}/>
      ) : (
        <button className="add-card" onClick={()=>setAdding(true)}><span className="plus">+</span> Add a task</button>
      )}
    </div>
  );
}
function TaskCard({it,onComplete,onToggleToday,onEdit,onDelete,dropTarget,onDragStart,onDragEnter,onDrop}){
  const [editing,setEditing]=useState(false);
  const ref=useAutoGrow(it.text);
  return (
    <div className={"card"+(dropTarget?" drop-target":"")} draggable={!editing}
      onDragStart={(e)=>{ e.dataTransfer.effectAllowed="move"; onDragStart(); }}
      onDragEnter={onDragEnter} onDragOver={(e)=>{ if(!editing) e.preventDefault(); }}
      onDrop={(e)=>{ e.preventDefault(); onDrop(); }} onDragEnd={onDrop}>
      <span className="grip-c" title="Drag to reorder">⋮⋮</span>
      <button className="check" title="Mark done" onClick={onComplete}></button>
      <textarea ref={ref} className="card-text" rows={1} value={it.text} spellCheck={false}
        onFocus={()=>setEditing(true)} onBlur={()=>setEditing(false)} onChange={e=>onEdit(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();e.target.blur();} }}/>
      <button className={"star"+(it.today?" on":"")} title={it.today?"In Today — tap to remove":"Send to Today"} onClick={onToggleToday}>☀</button>
      <button className="kill" title="Delete" onClick={onDelete}>×</button>
    </div>
  );
}

/* ================================ Archive ================================ */
function Archive({archive,onClose,onRestore,onDelete}){
  const groups=groupByDay(archive);
  return (
    <div className="scrim" onClick={onClose}>
      <div className="arch" onClick={e=>e.stopPropagation()}>
        <div className="arch-top">
          <div><h3>Archive</h3><p>What you've finished, by day.</p></div>
          <button className="arch-x" onClick={onClose} aria-label="Close">×</button>
        </div>
        <div className="arch-body">
          {archive.length===0 ? (
            <div className="arch-empty"><span className="big">🗂</span>Nothing archived yet. Check off a task and it lands here, stamped with the day you finished it.</div>
          ) : groups.map(g=>(
            <div className="arch-day" key={g.key}>
              <div className="arch-day-h"><span className="d">{g.label}</span><span className="n">{g.items.length} done</span></div>
              {g.items.map(it=>(
                <div className="arch-row" key={it.id}>
                  <span className="done-dot"></span>
                  <span className="a-text">{it.text}</span>
                  <div className="arch-meta">
                    <span className="chip" title={it.tag}>{it.tag}</span>
                    <span className="time">{timeLabel(it.completedAt)}</span>
                    <button className="arch-act" onClick={()=>onRestore(it.id)} title="Put it back">Restore</button>
                    <button className="arch-act" onClick={()=>onDelete(it.id)} title="Remove from archive">Delete</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ================================ Link modal ================================ */
function LinkModal({onClose,onSave}){
  const [label,setLabel]=useState(""), [url,setUrl]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ ref.current && ref.current.focus(); },[]);
  const save=()=>{ if(url.trim()||label.trim()) onSave(label.trim()||"link", url.trim()); };
  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Add a quick link</h3>
        <p className="sub">A bubble that jumps straight to where you work — Drive, a doc, a repo, anything.</p>
        <div className="field"><label>Label</label>
          <input ref={ref} value={label} placeholder="Drive" onChange={e=>setLabel(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(); }}/></div>
        <div className="field"><label>Link</label>
          <input value={url} placeholder="https://drive.google.com/…" onChange={e=>setUrl(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(); }}/></div>
        <div className="modal-actions"><button className="btn-ghost" onClick={onClose}>Cancel</button><button className="btn-solid" onClick={save}>Add link</button></div>
      </div>
    </div>
  );
}

function normalizeUrl(u){ if(!u) return "#"; return /^https?:\/\//i.test(u)? u : "https://"+u; }

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
