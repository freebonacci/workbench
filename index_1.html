<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ============================ STORAGE: Supabase ============================ */
const configured = () =>
  window.SUPABASE_URL && !window.SUPABASE_URL.includes("YOUR-PROJECT") &&
  window.SUPABASE_ANON_KEY && !window.SUPABASE_ANON_KEY.includes("YOUR-PUBLIC");

let sb = null;
const client = () => {
  if(!sb) sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    auth: { persistSession:true, autoRefreshToken:true, storageKey:"workbench-auth" }
  });
  return sb;
};
const Store = {
  async load(){
    const {data,error} = await client().from("boards").select("data").maybeSingle();
    if(error) throw error;
    return data ? data.data : null;
  },
  async save(board,userId){
    const {error} = await client().from("boards")
      .upsert({id:userId, data:board, updated_at:new Date().toISOString()});
    if(error) throw error;
  }
};

/* ---------- seed for a brand-new board ---------- */
const seed = () => ({ projects:[
  { id:uid(), name:"Website Redesign",
    links:[{id:uid(),label:"Drive",url:"https://drive.google.com"},{id:uid(),label:"Figma",url:"https://figma.com"}],
    status:"Wireframes signed off. Waiting on final copy before I start the build.",
    questions:[{id:uid(),text:"How do we keep the homepage feeling fast?"},{id:uid(),text:"How do we make the nav obvious on mobile?"}],
    tasks:[{id:uid(),text:"Export hero illustrations",done:true},{id:uid(),text:"Write the About page copy",done:false},{id:uid(),text:"Set up the contact form",done:false}] },
  { id:uid(), name:"Q3 Report",
    links:[{id:uid(),label:"Doc",url:"https://docs.google.com"}],
    status:"Pulling numbers together. Draft due end of month.",
    questions:[{id:uid(),text:"How do we tell the growth story honestly?"}],
    tasks:[{id:uid(),text:"Get sales figures from Sam",done:false},{id:uid(),text:"Build the revenue chart",done:false}] },
]});

function useAutoGrow(value){
  const ref = useRef(null);
  useEffect(()=>{ const el=ref.current; if(el){ el.style.height="auto"; el.style.height=el.scrollHeight+"px"; } },[value]);
  return ref;
}

/* ================================ Root ================================ */
function Root(){
  const [phase,setPhase] = useState("boot"); // boot | setup | login | app
  const [user,setUser] = useState(null);

  useEffect(()=>{
    if(!configured()){ setPhase("setup"); return; }
    const c = client();
    c.auth.getSession().then(({data})=>{
      if(data.session){ setUser(data.session.user); setPhase("app"); }
      else setPhase("login");
    });
    const {data:sub} = c.auth.onAuthStateChange((_e,session)=>{
      if(session){ setUser(session.user); setPhase("app"); }
      else { setUser(null); setPhase("login"); }
    });
    return ()=> sub.subscription.unsubscribe();
  },[]);

  if(phase==="boot")  return <Gate><p className="lead">Loading…</p></Gate>;
  if(phase==="setup") return <SetupGate/>;
  if(phase==="login") return <Login/>;
  return <App user={user} onSignOut={()=>client().auth.signOut()}/>;
}

function Gate({children}){
  return (
    <div className="gate"><div className="gate-card">
      <div className="mark"><h1>Workbench</h1><span className="tag">project board</span></div>
      {children}
    </div></div>
  );
}

function SetupGate(){
  return (
    <Gate>
      <p className="lead">Almost there — this build just needs your Supabase keys.</p>
      <div className="setup-note">
        Open the HTML file and fill in <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> near the top
        (find them in Supabase → <strong>Project Settings → API</strong>). Full walkthrough is in <strong>SETUP.md</strong>.
      </div>
    </Gate>
  );
}

/* ================================ Login ================================ */
const EMAIL_KEY = "workbench:last-email";
function Login(){
  const remembered = (()=>{ try{ return localStorage.getItem(EMAIL_KEY)||""; }catch(e){ return ""; } })();
  const [email,setEmail] = useState(remembered);
  const [pw,setPw] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);
  const emailRef = useRef(null);
  const pwRef = useRef(null);
  useEffect(()=>{
    // if we already know the email, jump straight to the password
    if(remembered && pwRef.current) pwRef.current.focus();
    else if(emailRef.current) emailRef.current.focus();
  },[]);

  const submit = async()=>{
    if(busy) return;
    setErr(""); setBusy(true);
    try{ localStorage.setItem(EMAIL_KEY, email.trim()); }catch(e){}
    const {error} = await client().auth.signInWithPassword({email:email.trim(), password:pw});
    if(error){ setErr(error.message || "That didn't work — check your email and password."); setBusy(false); }
    // success → onAuthStateChange flips to the app
  };

  const hint = window.PASSWORD_HINT;
  return (
    <Gate>
      <p className="lead">Sign in to your board.</p>
      <div className="field">
        <label>Email</label>
        <input ref={emailRef} type="email" value={email} placeholder="you@email.com"
          onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/>
      </div>
      <div className="field">
        <label>Password</label>
        <input ref={pwRef} type="password" value={pw} placeholder="••••••••"
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/>
        {hint && <p className="pw-hint">{hint}</p>}
      </div>
      <button className="gate-btn" onClick={submit} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
      {err && <p className="gate-err">{err}</p>}
    </Gate>
  );
}

/* ================================ App ================================ */
function App({user,onSignOut}){
  const [board,setBoard] = useState(null);
  const [state,setState] = useState("loading"); // loading | dirty | saved | error
  const [modal,setModal] = useState(null);
  const saveT = useRef(null);
  const drag = useRef(null);
  const skipSave = useRef(true);

  // load this user's board once
  useEffect(()=>{ (async()=>{
    try{
      const loaded = await Store.load();
      if(loaded){ setBoard(loaded); }
      else { const s = seed(); setBoard(s); await Store.save(s,user.id); }
      setState("saved");
    }catch(e){ console.error(e); setState("error"); setBoard({projects:[]}); }
  })(); },[user.id]);

  // persist on change (debounced), skipping the initial load
  useEffect(()=>{
    if(board===null) return;
    if(skipSave.current){ skipSave.current=false; return; }
    setState("dirty");
    clearTimeout(saveT.current);
    saveT.current = setTimeout(async()=>{
      try{ await Store.save(board,user.id); setState("saved"); }
      catch(e){ console.error(e); setState("error"); }
    },600);
    return ()=>clearTimeout(saveT.current);
  },[board,user.id]);

  const update = useCallback((fn)=> setBoard(b=>({...b, projects: fn(b.projects)})),[]);
  const patchProject = (pid,patch)=> update(ps=>ps.map(p=>p.id===pid?{...p,...patch}:p));
  const addProject = ()=> update(ps=>[...ps,{id:uid(),name:"New project",links:[],status:"",questions:[],tasks:[]}]);
  const removeProject = (pid)=> update(ps=>ps.filter(p=>p.id!==pid));
  const reorder = (pid,key,from,to)=> update(ps=>ps.map(p=>{
    if(p.id!==pid) return p;
    const arr=[...p[key]]; const [m]=arr.splice(from,1); arr.splice(to,0,m); return {...p,[key]:arr};
  }));
  const reorderCols = (from,to)=> update(ps=>{ const a=[...ps]; const [m]=a.splice(from,1); a.splice(to,0,m); return a; });

  const statusText = {loading:"loading…",dirty:"saving…",saved:"all saved",error:"save failed — retrying on next edit"}[state];

  if(board===null) return <Gate><p className="lead">Opening your board…</p></Gate>;

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand"><h1>Workbench</h1><span className="tag">project board</span></div>
        <span className={"saved"+(state==="dirty"?" dirty":"")+(state==="error"?" err":"")}><i></i>{statusText}</span>
        <button className="btn-new" onClick={addProject}><span>+</span> New project</button>
        <button className="iconbtn" onClick={onSignOut} title="Sign out">Sign out</button>
      </div>

      {board.projects.length===0 ? (
        <div className="board"><div className="empty">
          <h2>A clean bench.</h2>
          <p>Every project gets a column — name, quick links, a note on where things stand, the open questions you're chewing on, and the small tasks. Start with your first.</p>
          <button className="btn-new" onClick={addProject}><span>+</span> New project</button>
        </div></div>
      ) : (
        <div className="board">
          {board.projects.map((p,ci)=>(
            <Column key={p.id} p={p} ci={ci} patch={patchProject} remove={removeProject}
              reorder={reorder} openLink={()=>setModal({projectId:p.id})} drag={drag} reorderCols={reorderCols}/>
          ))}
          <button className="add-col" onClick={addProject}>
            <span className="ring">+</span><span className="lbl">Add project</span>
          </button>
        </div>
      )}

      {modal && <LinkModal onClose={()=>setModal(null)} onSave={(label,url)=>{
        patchProject(modal.projectId,{links:[...board.projects.find(p=>p.id===modal.projectId).links,{id:uid(),label,url}]});
        setModal(null);
      }}/>}
    </div>
  );
}

/* ================================ Column ================================ */
function Column({p,ci,patch,remove,reorder,openLink,drag,reorderCols}){
  const [menu,setMenu] = useState(false);
  const [over,setOver] = useState(false);
  const nameRef = useAutoGrow(p.name);
  const statusRef = useAutoGrow(p.status);

  const onColDragStart = (e)=>{ drag.current={type:"col",from:ci}; e.dataTransfer.effectAllowed="move"; };
  const onColDrop = (e)=>{ e.preventDefault(); setOver(false);
    if(drag.current?.type==="col" && drag.current.from!==ci) reorderCols(drag.current.from,ci); drag.current=null; };

  const setLinks=(links)=>patch(p.id,{links});
  const setQuestions=(questions)=>patch(p.id,{questions});
  const setTasks=(tasks)=>patch(p.id,{tasks});
  const doneCount = p.tasks.filter(t=>t.done).length;

  return (
    <div className={"col"+(over?" drop-target":"")}
      onDragOver={(e)=>{ if(drag.current?.type==="col"){ e.preventDefault(); setOver(true);} }}
      onDragLeave={()=>setOver(false)} onDrop={onColDrop}>

      <div className="col-head">
        <span className="grip" draggable onDragStart={onColDragStart} onDragEnd={()=>{drag.current=null;}} title="Drag to reorder">⋮⋮</span>
        <div className="name-row">
          <textarea className="name" rows={1} ref={nameRef} value={p.name} spellCheck={false}
            onChange={e=>patch(p.id,{name:e.target.value})}
            onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();e.target.blur();} }}/>
          <div className="col-menu">
            <button className="dots" onClick={()=>setMenu(m=>!m)} aria-label="Project menu">⋯</button>
            {menu && (<>
              <div style={{position:"fixed",inset:0,zIndex:20}} onClick={()=>setMenu(false)}/>
              <div className="menu-pop">
                <button className="danger" onClick={()=>{ if(confirm("Delete “"+p.name+"” and everything in it?")) remove(p.id); setMenu(false); }}>🗑  Delete project</button>
              </div>
            </>)}
          </div>
        </div>

        <div className="links">
          {p.links.map(l=>(
            <a key={l.id} className="bubble" href={normalizeUrl(l.url)} target="_blank" rel="noopener noreferrer" title={l.url}>
              <span className="dot"></span><span>{l.label||"link"}</span>
              <button className="kill" title="Remove link" onClick={(e)=>{e.preventDefault();e.stopPropagation(); setLinks(p.links.filter(x=>x.id!==l.id));}}>×</button>
            </a>
          ))}
          <button className="bubble add" onClick={openLink}>+ link</button>
        </div>
      </div>

      <div className="col-body">
        <div className="status">
          <textarea ref={statusRef} rows={1} value={p.status} placeholder="Where are things at? Jot a quick status…"
            onChange={e=>patch(p.id,{status:e.target.value})}/>
        </div>

        <Section label="Questions" kind="questions" items={p.questions} count={p.questions.length+""}
          pid={p.id} drag={drag} reorder={reorder}
          onAdd={(text)=>setQuestions([...p.questions,{id:uid(),text}])}
          onEdit={(id,text)=>setQuestions(p.questions.map(x=>x.id===id?{...x,text}:x))}
          onDelete={(id)=>setQuestions(p.questions.filter(x=>x.id!==id))}
          addLabel="Frame a question" addPlaceholder="How do we…"/>

        <Section label="Tasks" kind="tasks" items={p.tasks}
          count={p.tasks.length? doneCount+"/"+p.tasks.length : "0"}
          pid={p.id} drag={drag} reorder={reorder} checkable
          onAdd={(text)=>setTasks([...p.tasks,{id:uid(),text,done:false}])}
          onEdit={(id,text)=>setTasks(p.tasks.map(x=>x.id===id?{...x,text}:x))}
          onToggle={(id)=>setTasks(p.tasks.map(x=>x.id===id?{...x,done:!x.done}:x))}
          onDelete={(id)=>setTasks(p.tasks.filter(x=>x.id!==id))}
          addLabel="Add a task"/>
      </div>
    </div>
  );
}

/* ================================ Section ================================ */
function Section({label,kind,items,count,pid,drag,reorder,checkable,onAdd,onEdit,onToggle,onDelete,addLabel,addPlaceholder}){
  const [adding,setAdding] = useState(false);
  const [draft,setDraft] = useState("");
  const [overIdx,setOverIdx] = useState(-1);
  const inputRef = useRef(null);
  useEffect(()=>{ if(adding && inputRef.current) inputRef.current.focus(); },[adding]);
  const commit = ()=>{ const t=draft.trim(); if(t) onAdd(t); setDraft(""); setAdding(false); };

  return (
    <div className="section">
      <div className={"sec-head "+kind}>
        <span className="sec-label">{label}</span>
        <span className="sec-count">{count}</span>
      </div>

      {items.map((it,i)=>(
        <Card key={it.id} it={it} kind={kind} checkable={checkable} dropTarget={overIdx===i}
          onDragStart={()=>{ drag.current={type:"card",pid,kind,from:i}; }}
          onDragEnter={()=>{ if(drag.current?.type==="card"&&drag.current.pid===pid&&drag.current.kind===kind) setOverIdx(i); }}
          onDrop={()=>{ const d=drag.current; setOverIdx(-1);
            if(d?.type==="card"&&d.pid===pid&&d.kind===kind&&d.from!==i) reorder(pid,kind,d.from,i); drag.current=null; }}
          onEdit={(t)=>onEdit(it.id,t)} onToggle={onToggle?()=>onToggle(it.id):null} onDelete={()=>onDelete(it.id)}/>
      ))}

      {adding ? (
        <input ref={inputRef} className="add-input" value={draft} placeholder={(addPlaceholder||addLabel)+"…"}
          onChange={e=>setDraft(e.target.value)} onBlur={commit}
          onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();commit();} if(e.key==="Escape"){setDraft("");setAdding(false);} }}/>
      ) : (
        <button className="add-card" onClick={()=>setAdding(true)}><span className="plus">+</span> {addLabel}</button>
      )}
    </div>
  );
}

/* ================================ Card ================================ */
function Card({it,kind,checkable,dropTarget,onDragStart,onDragEnter,onDrop,onEdit,onToggle,onDelete}){
  const [editing,setEditing] = useState(false);
  const ref = useAutoGrow(it.text);
  return (
    <div className={"card "+kind+(it.done?" done":"")+(dropTarget?" drop-target":"")} draggable={!editing}
      onDragStart={(e)=>{ e.dataTransfer.effectAllowed="move"; onDragStart(); }}
      onDragEnter={onDragEnter}
      onDragOver={(e)=>{ if(!editing) e.preventDefault(); }}
      onDrop={(e)=>{ e.preventDefault(); onDrop(); }} onDragEnd={onDrop}>
      <span className="grip-c" title="Drag to reorder">⋮⋮</span>
      {checkable && <button className={"check"+(it.done?" on":"")} onClick={onToggle} aria-label={it.done?"Mark not done":"Mark done"}></button>}
      <textarea ref={ref} className="card-text" rows={1} value={it.text} spellCheck={false}
        onFocus={()=>setEditing(true)} onBlur={()=>setEditing(false)} onChange={e=>onEdit(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();e.target.blur();} }}/>
      <button className="kill" title="Delete" onClick={onDelete}>×</button>
    </div>
  );
}

/* ================================ Link modal ================================ */
function LinkModal({onClose,onSave}){
  const [label,setLabel] = useState("");
  const [url,setUrl] = useState("");
  const ref = useRef(null);
  useEffect(()=>{ ref.current && ref.current.focus(); },[]);
  const save = ()=>{ if(url.trim()||label.trim()) onSave(label.trim()||"link", url.trim()); };
  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Add a quick link</h3>
        <p className="sub">A bubble that jumps straight to where you work — Drive, a doc, a repo, anything.</p>
        <div className="field"><label>Label</label>
          <input ref={ref} value={label} placeholder="Drive" onChange={e=>setLabel(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(); }}/></div>
        <div className="field"><label>Link</label>
          <input value={url} placeholder="https://drive.google.com/…" onChange={e=>setUrl(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(); }}/></div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn-solid" onClick={save}>Add link</button>
        </div>
      </div>
    </div>
  );
}

function normalizeUrl(u){ if(!u) return "#"; return /^https?:\/\//i.test(u)? u : "https://"+u; }

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
